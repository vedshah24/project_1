<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United Scouting Dashboard</title>
    <style>
        :root {
            --man-utd-red: #DA291C;
            --bg-dark: #0b0b0b;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 2rem;
        }

        body.modal-active {
            overflow: hidden;
        }

        .page-title {
            margin: 0 0 1.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .control-center {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .filter-btn {
            background: #111;
            color: var(--text-main);
            border: 1px solid #333;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--man-utd-red);
        }

        .filter-btn.active {
            background: var(--man-utd-red);
            border-color: var(--man-utd-red);
        }

        .sort-group {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .sort-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        #sort-by {
            background: #111;
            color: var(--text-main);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
        }

        #squad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            position: relative;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: var(--man-utd-red);
        }

        .position-abbr {
            font-size: 2.75rem;
            font-weight: 800;
            line-height: 1;
            color: var(--man-utd-red);
            letter-spacing: 0.08em;
            margin-bottom: 0.25rem;
            font-variant-numeric: tabular-nums;
        }

        .player-position {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .rating-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: #111;
            border: 1px solid #444;
            color: var(--text-main);
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.3rem 0.6rem;
            letter-spacing: 0.03em;
        }

        .rating-badge.silver {
            background: #c0c0c0;
            color: #1a1a1a;
            border-color: #b2b2b2;
        }

        .rating-badge.gold {
            background: #d4af37;
            color: #1a1a1a;
            border-color: #c29b2b;
        }

        .player-name {
            margin: 0.15rem 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .grid-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dim);
            padding: 2rem;
        }

        #player-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        body.modal-active #player-modal {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(2px);
        }

        .modal-container {
            position: relative;
            width: min(680px, 100%);
            background: linear-gradient(180deg, #202020 0%, #171717 100%);
            border: 1px solid #3a3a3a;
            border-radius: 18px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.55);
            padding: 1.5rem;
            z-index: 1;
        }

        .modal-close {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            width: 2rem;
            height: 2rem;
            border: 1px solid #4a4a4a;
            border-radius: 999px;
            background: #111;
            color: #fff;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
        }

        .modal-header {
            margin-bottom: 1rem;
            padding-right: 2.5rem;
        }

        .modal-player-name {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .modal-meta {
            margin-top: 0.5rem;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .modal-rating {
            margin-top: 0.8rem;
            display: inline-block;
            background: #111;
            border: 1px solid #4a4a4a;
            border-radius: 999px;
            padding: 0.35rem 0.7rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .modal-section-title {
            margin: 0 0 0.75rem 0;
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .modal-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .modal-stat {
            background: #101010;
            border: 1px solid #313131;
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
        }

        .modal-stat-label {
            display: block;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .modal-stat-value {
            margin-top: 0.25rem;
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <h1 class="page-title">United Scouting Dashboard</h1>
    <section class="control-center" aria-label="Squad controls">
        <div class="filter-group" id="position-filters" role="group" aria-label="Filter by position">
            <button type="button" class="filter-btn active" data-position="ALL">ALL</button>
            <button type="button" class="filter-btn" data-position="ST">ST</button>
            <button type="button" class="filter-btn" data-position="MD">MD</button>
            <button type="button" class="filter-btn" data-position="CB">CB</button>
            <button type="button" class="filter-btn" data-position="RB">RB</button>
        </div>
        <div class="sort-group">
            <label class="sort-label" for="sort-by">Sort By</label>
            <select id="sort-by">
                <option value="rating-desc">Highest Rating</option>
                <option value="goals-desc">Goals (High to Low)</option>
                <option value="assists-desc">Assists (High to Low)</option>
                <option value="appearances-desc">Appearances</option>
            </select>
        </div>
    </section>
    <div id="squad-grid" aria-live="polite"></div>

    <div id="player-modal" aria-hidden="true">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <section class="modal-container" role="dialog" aria-modal="true" aria-label="Player details">
            <button class="modal-close" id="modal-close-btn" type="button" aria-label="Close player details">X</button>
            <header class="modal-header">
                <h2 class="modal-player-name" id="modal-player-name">Player Name</h2>
                <p class="modal-meta">Position: <span id="modal-player-position">Position</span></p>
                <span class="modal-rating" id="modal-player-rating">Rating: 0</span>
            </header>
            <section>
                <h3 class="modal-section-title">Stats Breakdown</h3>
                <div class="modal-stats-grid">
                    <div class="modal-stat">
                        <span class="modal-stat-label">Goals</span>
                        <span class="modal-stat-value" id="modal-player-goals">0</span>
                    </div>
                    <div class="modal-stat">
                        <span class="modal-stat-label">Assists</span>
                        <span class="modal-stat-value" id="modal-player-assists">0</span>
                    </div>
                    <div class="modal-stat">
                        <span class="modal-stat-label">Appearance</span>
                        <span class="modal-stat-value" id="modal-player-appearance">0</span>
                    </div>
                    <div class="modal-stat">
                        <span class="modal-stat-label">Clean Sheets</span>
                        <span class="modal-stat-value" id="modal-player-clean-sheets">0</span>
                    </div>
                </div>
            </section>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://zgpeqrawhlbsdobxufoj.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpncGVxcmF3aGxic2RvYnh1Zm9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTgzMDgsImV4cCI6MjA5MzI5NDMwOH0.0UHyuz-GPoieQUgGaHgo2oQmvY_KIGI34Boqj9l2p28";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
        const filters = ["ALL", "ST", "MD", "CB", "RB"];
        let allPlayers = [];
        const state = {
            positionFilter: "ALL",
            sortBy: "rating-desc"
        };

        function positionAbbreviation(position) {
            if (position == null || String(position).trim() === "") return "—";
            const s = String(position).trim().toUpperCase();
            return s.length <= 2 ? s : s.slice(0, 2);
        }

        function createPlayerCard(player) {
            const card = document.createElement("article");
            card.className = "player-card";

            const ratingBadge = document.createElement("span");
            ratingBadge.className = "rating-badge";
            ratingBadge.textContent = "Rating " + (player.rating ?? 0);
            if (player.rating >= 100) {
                ratingBadge.classList.add("gold");
            } else if (player.rating >= 50) {
                ratingBadge.classList.add("silver");
            }

            const abbr = document.createElement("div");
            abbr.className = "position-abbr";
            abbr.textContent = positionAbbreviation(player.position);
            abbr.setAttribute("aria-label", "Position " + (player.position ?? ""));

            const nameEl = document.createElement("h2");
            nameEl.className = "player-name";
            nameEl.textContent = player.name ?? "Unknown";

            const positionText = document.createElement("p");
            positionText.className = "player-position";
            positionText.textContent = player.position ?? "Unknown Position";

            card.append(ratingBadge, abbr, nameEl, positionText);
            return card;
        }

        function toNumber(value) {
            const n = Number(value);
            return Number.isFinite(n) ? n : 0;
        }

        function sortPlayers(players, sortBy) {
            const sorted = [...players];
            sorted.sort((a, b) => {
                if (sortBy === "rating-desc") {
                    return toNumber(b.rating) - toNumber(a.rating);
                }
                if (sortBy === "assists-desc") {
                    return toNumber(b.assists) - toNumber(a.assists);
                }
                if (sortBy === "appearances-desc") {
                    return toNumber(b.appearance) - toNumber(a.appearance);
                }
                return toNumber(b.goals) - toNumber(a.goals);
            });
            return sorted;
        }

        function getVisiblePlayers(players) {
            const filtered = state.positionFilter === "ALL"
                ? [...players]
                : players.filter((player) => positionAbbreviation(player.position) === state.positionFilter);
            return sortPlayers(filtered, state.sortBy);
        }

        function displayPlayers(players) {
            const grid = document.getElementById("squad-grid");
            const playersWithScore = players.map((player) => {
                console.log("Player Stats:", player.name, player.appearance, player.clean_sheets);
                const rating = (Number(player.goals || 0) * 5) + (Number(player.assists || 0) * 3) + (Number(player.clean_sheets || 0) * 4) + (Number(player.appearance || 0) * 1);
                return {
                    ...player,
                    rating
                };
            });
            const visiblePlayers = getVisiblePlayers(playersWithScore);
            grid.innerHTML = "";

            if (visiblePlayers.length === 0) {
                grid.innerHTML = '<p class="grid-message">No players match this filter.</p>';
                return;
            }

            const fragment = document.createDocumentFragment();
            for (const player of visiblePlayers) {
                const card = createPlayerCard(player);
                card.addEventListener("click", () => {
                    openPlayerModal(player);
                });
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);
        }

        function openPlayerModal(player) {
            document.getElementById("modal-player-name").textContent = player.name ?? "Unknown";
            document.getElementById("modal-player-position").textContent = player.position ?? "Unknown Position";
            document.getElementById("modal-player-rating").textContent = "Rating: " + (player.rating ?? 0);
            document.getElementById("modal-player-goals").textContent = String(player.goals ?? 0);
            document.getElementById("modal-player-assists").textContent = String(player.assists ?? 0);
            document.getElementById("modal-player-appearance").textContent = String(player.appearance ?? 0);
            document.getElementById("modal-player-clean-sheets").textContent = String(player.clean_sheets ?? 0);
            document.body.classList.add("modal-active");
            document.getElementById("player-modal").setAttribute("aria-hidden", "false");
        }

        function closePlayerModal() {
            document.body.classList.remove("modal-active");
            document.getElementById("player-modal").setAttribute("aria-hidden", "true");
        }

        function bindControls() {
            const filterGroup = document.getElementById("position-filters");
            const sortBySelect = document.getElementById("sort-by");

            filterGroup.addEventListener("click", (event) => {
                const btn = event.target.closest(".filter-btn");
                if (!btn) return;

                const nextFilter = btn.dataset.position;
                if (!filters.includes(nextFilter)) return;
                state.positionFilter = nextFilter;

                for (const el of filterGroup.querySelectorAll(".filter-btn")) {
                    el.classList.toggle("active", el === btn);
                }
                displayPlayers(allPlayers);
            });

            sortBySelect.addEventListener("change", (event) => {
                state.sortBy = event.target.value;
                displayPlayers(allPlayers);
            });
        }

        function bindModalEvents() {
            document.getElementById("modal-close-btn").addEventListener("click", closePlayerModal);
            document.getElementById("modal-backdrop").addEventListener("click", closePlayerModal);
        }

        async function fetchPlayers() {
            const grid = document.getElementById("squad-grid");
            grid.innerHTML = '<p class="grid-message">Loading squad…</p>';

            const { data, error } = await supabaseClient
                .from("players")
                .select("*");
            console.log("Fetched data:", data);

            if (error) {
                console.error("Failed to fetch players:", error);
                grid.innerHTML =
                    '<p class="grid-message">Could not load squad. Check the console for details.</p>';
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML = '<p class="grid-message">No players in the database.</p>';
                return;
            }

            allPlayers = data;
            displayPlayers(allPlayers);
        }

        window.addEventListener("DOMContentLoaded", () => {
            bindControls();
            bindModalEvents();
            fetchPlayers();
        });
    </script>
</body>
</html>
