<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United Scouting Dashboard</title>
    <style>
        :root {
            --man-utd-red: #DA291C;
            --bg-dark: #0b0b0b;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 2rem;
        }

        .page-title {
            margin: 0 0 1.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
        }

        #squad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: var(--man-utd-red);
        }

        .position-abbr {
            font-size: 2.75rem;
            font-weight: 800;
            line-height: 1;
            color: var(--man-utd-red);
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
            font-variant-numeric: tabular-nums;
        }

        .badge {
            background: var(--man-utd-red);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-name {
            margin: 15px 0 5px 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .stat-box .label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 18px;
            font-weight: bold;
        }

        .grid-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dim);
            padding: 2rem;
        }
    </style>
</head>
<body>

    <h1 class="page-title">United Scouting Dashboard</h1>
    <div id="squad-grid" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://zgpeqrawhlbsdobxufoj.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpncGVxcmF3aGxic2RvYnh1Zm9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTgzMDgsImV4cCI6MjA5MzI5NDMwOH0.0UHyuz-GPoieQUgGaHgo2oQmvY_KIGI34Boqj9l2p28";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

        function positionAbbreviation(position) {
            if (position == null || String(position).trim() === "") return "—";
            const s = String(position).trim().toUpperCase();
            return s.length <= 2 ? s : s.slice(0, 2);
        }

        function createPlayerCard(player) {
            const card = document.createElement("article");
            card.className = "player-card";

            const abbr = document.createElement("div");
            abbr.className = "position-abbr";
            abbr.textContent = positionAbbreviation(player.position);
            abbr.setAttribute("aria-label", "Position " + (player.position ?? ""));

            const badge = document.createElement("span");
            badge.className = "badge";
            badge.textContent = "MUFC Elite";

            const nameEl = document.createElement("h2");
            nameEl.className = "player-name";
            nameEl.textContent = player.name ?? "Unknown";

            const statsGrid = document.createElement("div");
            statsGrid.className = "stats-grid";

            const goalsBox = document.createElement("div");
            goalsBox.className = "stat-box";
            goalsBox.innerHTML =
                '<span class="label">Goals</span><span class="value">' +
                (player.goals ?? "0") +
                "</span>";

            const assistsBox = document.createElement("div");
            assistsBox.className = "stat-box";
            assistsBox.innerHTML =
                '<span class="label">Assists</span><span class="value">' +
                (player.assists ?? "0") +
                "</span>";

            statsGrid.append(goalsBox, assistsBox);
            card.append(abbr, badge, nameEl, statsGrid);
            return card;
        }

        async function loadSquad() {
            const grid = document.getElementById("squad-grid");
            grid.innerHTML = '<p class="grid-message">Loading squad…</p>';

            const { data: players, error } = await supabaseClient
                .from("players")
                .select("name, position, goals, assists")
                .order("name");

            if (error) {
                console.error("Failed to fetch players:", error);
                grid.innerHTML =
                    '<p class="grid-message">Could not load squad. Check the console for details.</p>';
                return;
            }

            grid.innerHTML = "";

            if (!players || players.length === 0) {
                grid.innerHTML = '<p class="grid-message">No players in the database.</p>';
                return;
            }

            const fragment = document.createDocumentFragment();
            for (const player of players) {
                fragment.appendChild(createPlayerCard(player));
            }
            grid.appendChild(fragment);
        }

        window.addEventListener("DOMContentLoaded", loadSquad);
    </script>
</body>
</html>
